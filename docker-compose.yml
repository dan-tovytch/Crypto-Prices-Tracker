services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: crypto-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - crypto-network
    depends_on:
      - db
      - redis

  reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: crypto-reverb
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    ports:
      - "8080:8080"
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    networks:
      - crypto-network
    depends_on:
      - app

  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: crypto-queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    command: php artisan queue:work redis --verbose --tries=3 --timeout=90
    networks:
      - crypto-network
    depends_on:
      - db
      - redis
      - app

  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: crypto-scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    command: php artisan schedule:work
    networks:
      - crypto-network
    depends_on:
      - db
      - redis
      - app   

  nginx:
    image: nginx:alpine
    container_name: crypto-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - crypto-network
    depends_on:
      - app

  db: 
    image: postgres:16-alpine
    container_name: crypto-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - crypto-network

  redis:
    image: redis:alpine
    container_name: crypto-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - crypto-network

  node:
    image: node:23-alpine
    container_name: crypto-node
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    networks:
      - crypto-network

volumes:
  db-data:
  redis-data:

networks:
  crypto-network:
    driver: bridge